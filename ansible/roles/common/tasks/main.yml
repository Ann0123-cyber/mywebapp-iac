---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - python3
      - python3-pip
      - curl
    state: present

- name: Create teacher user
  user:
    name: teacher
    shell: /bin/bash
    groups: sudo
    append: true
    password: "$6$XORDFnuQ4V90B3WZ$VgPnXtd/3I..v.nZ9cpaWGD6UufkBdhSy3bW5teNiGg3jL7fdiHuUu0dTFdtnC4iVmM6B2TAdHGkKKK3.watR."

- name: Create gradebook file
  copy:
    content: "18\n"
    dest: /home/teacher/gradebook
    owner: teacher
    group: teacher
    mode: '0644'

- name: Enable password authentication for SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
  notify: restart sshd

- name: Enable keyboard interactive authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?KbdInteractiveAuthentication'
    line: 'KbdInteractiveAuthentication yes'
  notify: restart sshd
