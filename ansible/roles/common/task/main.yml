---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - python3
      - python3-pip
      - curl
    state: present

- name: Create teacher user
  user:
    name: teacher
    shell: /bin/bash
    groups: sudo
    append: true
    password: "$6$XORDFnuQ4V90B3WZ$VgPnXtd/3I..v.nZ9cpaWGD6UufkBdhSy3bW5teNiGg3jL7fdiHuUu0dTFdtnC4iVmM6B2TAdHGkKKK3.watR."

- name: Create gradebook file
  copy:
    content: "18\n"
    dest: /home/student/gradebook
    owner: root
    group: root
    mode: '0644'
  ignore_errors: true